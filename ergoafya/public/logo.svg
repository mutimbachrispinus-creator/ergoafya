<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      .ring-outer { fill: none; stroke: #1d5c38; stroke-width: 4; }
      .ring-inner { fill: none; stroke: #4aac78; stroke-width: 2; }
      .body-dark  { fill: none; stroke: #0f2318; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }
      .spine-dot  { fill: #4aac78; }
      .spine-wave { fill: none; stroke: #4aac78; stroke-width: 3; stroke-linecap: round; }
      .text-outer { font-family: Arial, Helvetica, sans-serif; font-size: 11.5px; font-weight: 700;
                    fill: #0f2318; letter-spacing: 2.5px; }
      .text-inner { font-family: Arial, Helvetica, sans-serif; font-size: 8.5px; font-weight: 600;
                    fill: #1d5c38; letter-spacing: 1.8px; }
    </style>
    <!-- circular text paths -->
    <path id="topArc"    d="M 100,100 m -72,0 a 72,72 0 1,1 144,0" />
    <path id="bottomArc" d="M 100,100 m -68,0 a 68,68 0 0,0 136,0" />
  </defs>

  <!-- outer oval ring -->
  <ellipse cx="100" cy="100" rx="95" ry="95" class="ring-outer"/>
  <!-- inner oval ring -->
  <ellipse cx="100" cy="100" rx="88" ry="88" class="ring-inner" stroke-dasharray="3 3"/>

  <!-- SEATED PERSON FIGURE -->
  <!-- Head -->
  <circle cx="108" cy="42" r="10" fill="none" stroke="#0f2318" stroke-width="3"/>

  <!-- Torso — upright upper body -->
  <path d="M 108 52 Q 106 72 102 88" class="body-dark"/>

  <!-- Chair seat -->
  <path d="M 72 118 L 118 118" stroke="#0f2318" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Chair leg vertical -->
  <path d="M 95 118 L 95 148" stroke="#0f2318" stroke-width="3" stroke-linecap="round"/>
  <!-- Chair base -->
  <path d="M 78 148 L 112 148" stroke="#0f2318" stroke-width="3" stroke-linecap="round"/>
  <!-- Chair back -->
  <path d="M 118 88 L 118 118" stroke="#0f2318" stroke-width="3" stroke-linecap="round"/>

  <!-- Hips / pelvis on seat -->
  <path d="M 102 88 Q 98 100 85 112 Q 80 116 80 118" class="body-dark"/>
  <!-- Upper leg on seat -->
  <path d="M 85 118 L 112 118" stroke="#0f2318" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Lower leg hanging down -->
  <path d="M 112 118 L 115 145" stroke="#0f2318" stroke-width="3" stroke-linecap="round"/>
  <!-- Foot -->
  <path d="M 115 145 L 126 148" stroke="#0f2318" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Arms -->
  <path d="M 106 65 Q 120 72 124 90" stroke="#0f2318" stroke-width="2.8" stroke-linecap="round" fill="none"/>

  <!-- SPINE — dotted vertebrae down the centre of back -->
  <circle cx="104" cy="59" r="2.8" class="spine-dot"/>
  <circle cx="103" cy="67" r="2.8" class="spine-dot"/>
  <circle cx="102" cy="75" r="2.8" class="spine-dot"/>
  <circle cx="101" cy="83" r="2.8" class="spine-dot"/>
  <circle cx="100" cy="91" r="2.5" class="spine-dot"/>
  <circle cx="99"  cy="98" r="2.2" class="spine-dot"/>

  <!-- TEAL SWOOSH — ergonomic wave beside figure -->
  <path d="M 68 52 Q 58 70 65 90 Q 72 110 62 130" class="spine-wave" stroke-width="5"/>
  <path d="M 75 48 Q 63 68 72 92 Q 80 115 68 138" class="spine-wave" stroke-width="3" opacity="0.55"/>

  <!-- CIRCULAR TEXT — top arc: ERGOAFYA SOLUTIONS -->
  <text class="text-outer">
    <textPath href="#topArc" startOffset="8%">ERGOAFYA SOLUTIONS</textPath>
  </text>

  <!-- CIRCULAR TEXT — bottom arc: HEALTHY PEOPLE • PRODUCTIVE WORKPLACE -->
  <text class="text-inner">
    <textPath href="#bottomArc" startOffset="3%">HEALTHY PEOPLE  •  PRODUCTIVE WORKPLACE</textPath>
  </text>
</svg>
