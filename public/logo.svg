<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d5c38"/>
      <stop offset="100%" stop-color="#4aac78"/>
    </linearGradient>
    <linearGradient id="swooshGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4aac78"/>
      <stop offset="50%" stop-color="#2d7a4f"/>
      <stop offset="100%" stop-color="#4aac78"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f2318"/>
      <stop offset="100%" stop-color="#1d5c38"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <path id="topArc"    d="M 100,100 m -72,0 a 72,72 0 1,1 144,0" />
    <path id="bottomArc" d="M 100,100 m -68,0 a 68,68 0 0,0 136,0" />
  </defs>

  <!-- Subtle background circle -->
  <circle cx="100" cy="100" r="97" fill="#f6f2eb" opacity="0.4"/>

  <!-- Outer ring with gradient -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#ringGrad)" stroke-width="3.5"/>
  <!-- Inner decorative ring -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#4aac78" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

  <!-- TEAL SWOOSH — ergonomic wave beside figure -->
  <path d="M 68 50 Q 55 72 64 92 Q 73 112 60 135" stroke="url(#swooshGrad)" stroke-width="5.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  <path d="M 76 46 Q 62 68 72 94 Q 82 118 67 142" stroke="#4aac78" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.4"/>

  <!-- SEATED PERSON FIGURE -->
  <!-- Head -->
  <circle cx="108" cy="42" r="10" fill="none" stroke="url(#bodyGrad)" stroke-width="3"/>
  <!-- Small detail — ear/hair hint -->
  <path d="M 116 38 Q 118 35 117 42" stroke="#0f2318" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Torso — upright upper body -->
  <path d="M 108 52 Q 106 72 102 88" fill="none" stroke="url(#bodyGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Chair back (ergonomic curve) -->
  <path d="M 120 84 Q 122 95 120 106 Q 119 112 118 118" stroke="#0f2318" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Chair seat -->
  <path d="M 72 118 L 120 118" stroke="#0f2318" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Chair leg vertical -->
  <path d="M 96 118 L 96 144" stroke="#0f2318" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Chair base with wheels hint -->
  <path d="M 78 148 L 114 148" stroke="#0f2318" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="80" cy="150" r="2.5" fill="#0f2318" opacity="0.4"/>
  <circle cx="112" cy="150" r="2.5" fill="#0f2318" opacity="0.4"/>

  <!-- Hips / pelvis on seat -->
  <path d="M 102 88 Q 98 100 85 112 Q 80 116 80 118" fill="none" stroke="url(#bodyGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Upper leg on seat -->
  <path d="M 85 118 L 114 118" stroke="#0f2318" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Lower leg hanging down -->
  <path d="M 114 118 L 116 144" stroke="#0f2318" stroke-width="2.8" stroke-linecap="round"/>
  <!-- Foot -->
  <path d="M 116 144 L 127 147" stroke="#0f2318" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Arms — typing gesture -->
  <path d="M 106 65 Q 118 70 122 82" stroke="#0f2318" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Forearm toward desk -->
  <path d="M 122 82 Q 126 86 130 86" stroke="#0f2318" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.7"/>

  <!-- SPINE — dotted vertebrae down the centre of back -->
  <circle cx="104" cy="58" r="3" fill="#4aac78" opacity="0.95"/>
  <circle cx="103.3" cy="66" r="2.8" fill="#4aac78" opacity="0.9"/>
  <circle cx="102.6" cy="74" r="2.6" fill="#4aac78" opacity="0.85"/>
  <circle cx="102" cy="82" r="2.4" fill="#4aac78" opacity="0.8"/>
  <circle cx="101" cy="89.5" r="2.2" fill="#4aac78" opacity="0.7"/>
  <circle cx="100" cy="96" r="2" fill="#4aac78" opacity="0.6"/>

  <!-- CIRCULAR TEXT — top arc: ERGOAFYA SOLUTIONS -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="11.5" font-weight="700"
        fill="#0f2318" letter-spacing="2.5">
    <textPath href="#topArc" startOffset="8%">ERGOAFYA SOLUTIONS</textPath>
  </text>

  <!-- CIRCULAR TEXT — bottom arc: HEALTHY PEOPLE • PRODUCTIVE WORKPLACE -->
  <text font-family="Arial, Helvetica, sans-serif" font-size="8.5" font-weight="600"
        fill="#1d5c38" letter-spacing="1.8">
    <textPath href="#bottomArc" startOffset="3%">HEALTHY PEOPLE  •  PRODUCTIVE WORKPLACE</textPath>
  </text>
</svg>
